groups:
  - name: astrofin
    interval: 30s
    rules:
      # --- Heartbeat (тестовый алерт) ---
      - alert: AlertPipelineHealthy
        expr: vector(1)
        for: 0m
        labels:
          severity: info
        annotations:
          summary: "Alertmanager pipeline is healthy"
          description: "This is a heartbeat alert to test end-to-end notification delivery."

      # ... остальные правила (DatabaseDown, RedisDown, HighErrorRate)
      # Database Connection Issues
      - alert: DatabaseDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is down"
          description: "Database has been unreachable for 1 minute"

      # Redis Down
      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Redis is down"
          description: "Cache layer has been unreachable for 1 minute"

      # High Error Rate (mapped to broker_errors_total)
      - alert: HighErrorRate
        expr: rate(astrofin_broker_errors_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate: {{ $value }}/s"
          description: "Broker/execution error rate is elevated"

      # --- TODO: Domain metrics to implement in P1 ---
