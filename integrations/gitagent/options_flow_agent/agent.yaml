name: OptionsFlowAgent
version: 1.0.0
type: analysis
domain: options

description: |
  Analyzes options flow, unusual activity, gamma exposure for market direction

capabilities:
  - options_flow_analysis
  - unusual_activity_detection
  - gamma_exposure
  - put_call_ratio

inputs:
  - options_data
  - market_state

outputs:
  - signal
  - confidence
  - gamma_exposure

sources:
  - Unusual Whales
  - CBOE
  - Polygon.io

karl_integration:
  reward_weight: 0.15
  supports_ttc: true
  supports_selfq: true
  oap_track: true
  replay_buffer_ready: true

constraints:
  - NEVER hallucinate indicators or data
  - ALWAYS reference input data in reasoning
  - MUST return structured output with confidence

tags:
  - options
  - core
  - karl_integrated
