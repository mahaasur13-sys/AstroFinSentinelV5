name: BradleyAgent
version: 1.0.0
type: analysis
domain: astro

description: |
  Bradley Siderograph model: planetary aspects correlation with S&P 500

capabilities:
  - siderograph_generation
  - planetary_aspect_analysis
  - market_correlation

inputs:
  - ephemeris
  - current_date

outputs:
  - siderograph_score
  - aspect_conflicts
  - signal

sources:
  - Swiss Ephemeris
  - Bradley Siderograph model

karl_integration:
  reward_weight: 0.03
  supports_ttc: true
  supports_selfq: true
  oap_track: true
  replay_buffer_ready: true

constraints:
  - NEVER hallucinate indicators or data
  - ALWAYS reference input data in reasoning
  - MUST return structured output with confidence

tags:
  - astro
  - core
  - karl_integrated
