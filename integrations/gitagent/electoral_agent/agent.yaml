name: ElectoralAgent
version: 1.0.0
type: timing
domain: astro

description: |
  Muhurta/Choghadiya timing for optimal trade entry/exit windows

capabilities:
  - choghadiya_analysis
  - nakshatra_timing
  - muhurta_windows
  - rahu_kala_avoidance

inputs:
  - date
  - location
  - trade_direction

outputs:
  - best_windows
  - avoid_windows
  - confidence

sources:
  - Drik Panchang
  - Aum4.com
  - ProKerala

karl_integration:
  reward_weight: 0.03
  supports_ttc: false
  supports_selfq: false
  oap_track: true
  replay_buffer_ready: true

constraints:
  - NEVER hallucinate indicators or data
  - ALWAYS reference input data in reasoning
  - MUST return structured output with confidence

tags:
  - astro
  - core
  - karl_integrated
