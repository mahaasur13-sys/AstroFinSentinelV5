name: BearResearcher
version: 1.0.0
type: analysis
domain: research

description: |
  Identifies bearish risks and negative narratives for trading decisions

capabilities:
  - bearish_risk_discovery
  - negative_momentum_identification
  - risk_mapping

inputs:
  - market_state
  - news
  - social_sentiment

outputs:
  - bearish_signals
  - risks

sources:
  - News API
  - Social Media
  - On-chain data

karl_integration:
  reward_weight: 0.05
  supports_ttc: true
  supports_selfq: true
  oap_track: true
  replay_buffer_ready: true

constraints:
  - NEVER hallucinate indicators or data
  - ALWAYS reference input data in reasoning
  - MUST return structured output with confidence

tags:
  - research
  - core
  - karl_integrated
