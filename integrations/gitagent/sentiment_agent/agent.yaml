name: SentimentAgent
version: 1.0.0
type: analysis
domain: sentiment

description: |
  Analyzes news, social media, and Fear & Greed Index for market sentiment

capabilities:
  - news_sentiment
  - social_media_analysis
  - fear_greed_index
  - reddit_twitter_analysis

inputs:
  - news
  - social_data
  - fear_greed

outputs:
  - sentiment_score
  - confidence
  - reasoning

sources:
  - News API
  - Reddit
  - Twitter
  - Fear & Greed Index

karl_integration:
  reward_weight: 0.1
  supports_ttc: true
  supports_selfq: true
  oap_track: true
  replay_buffer_ready: true

constraints:
  - NEVER hallucinate indicators or data
  - ALWAYS reference input data in reasoning
  - MUST return structured output with confidence

tags:
  - sentiment
  - core
  - karl_integrated
