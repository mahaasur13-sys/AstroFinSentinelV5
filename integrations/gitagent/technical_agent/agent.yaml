name: TechnicalAgent
version: 1.0.0
type: analysis
domain: technical

description: |
  Technical analysis: RSI, MACD, Bollinger, Volume

capabilities:
  - trend_detection
  - indicator_analysis
  - rsi_calculation
  - macd_analysis
  - bollinger_bands
  - volume_profile

inputs:
  - market_state
  - ohlcv_data
  - indicators

outputs:
  - signal
  - confidence
  - reasoning

sources:
  - Binance API
  - Technical analysis

karl_integration:
  reward_weight: 0.1
  supports_ttc: true
  supports_selfq: true
  oap_track: true
  replay_buffer_ready: true

constraints:
  - NEVER hallucinate indicators or data
  - ALWAYS reference input data in reasoning
  - MUST return structured output with confidence

tags:
  - technical
  - core
  - karl_integrated
