name: TimeWindowAgent
version: 1.0.0
type: timing
domain: astro

description: |
  Multi-timeframe entry windows (4H/1D/1W) combined with astro timing

capabilities:
  - multi_timeframe_windows
  - astro_timing_sync
  - window_alignment

inputs:
  - timeframes
  - astro_data

outputs:
  - aligned_windows
  - confidence
  - best_entry

sources:
  - Multi-TF analysis
  - Ephemeris

karl_integration:
  reward_weight: 0.02
  supports_ttc: true
  supports_selfq: true
  oap_track: true
  replay_buffer_ready: true

constraints:
  - NEVER hallucinate indicators or data
  - ALWAYS reference input data in reasoning
  - MUST return structured output with confidence

tags:
  - astro
  - core
  - karl_integrated
