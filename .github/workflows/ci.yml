name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run unit tests
        run: |
          python -m pytest tests/ -v --ignore=tests/test_kepler_property.py --ignore=tests/test_meta_rl.py
      - name: Compare backtest modes
        run: |
          python scripts/compare_backtest_modes.py --ci
