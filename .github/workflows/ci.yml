name: CI

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest ruff black mypy

      # --- LINT (быстрый, блокирует мусор) ---
      - name: Ruff (lint)
        run: ruff check .

      # --- FORMAT CHECK ---
      - name: Black (format)
        run: black --check .

      # --- TYPE CHECK ---
      - name: Mypy (typing)
        run: mypy . || true

      # --- TESTS ---
      - name: Run tests
        run: pytest
