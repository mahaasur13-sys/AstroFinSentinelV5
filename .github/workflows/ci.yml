name: CI

on:
  push:
    branches: [ master, develop, 'phase*', 'feat/**', 'fix/**' ]
  pull_request:
    branches: [ master, develop ]

# Cancel in-progress runs for the same branch on a new push.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12'
  COVERAGE_FAIL_UNDER: '85'

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Job 1: Architecture lint, secrets, static analysis (no Python needed)
  # ──────────────────────────────────────────────────────────────────────
  architecture:
    name: Architecture Governance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: ${{ env.PYTHON_VERSION }} }
      - name: Install governance tools
        run: |
          pip install --break-system-packages \
            detect-secrets ruff bandit mypy pytest pytest-asyncio \
            httpx structlog prometheus-client fastapi uvicorn psutil \
            pydantic redis faiss-cpu numpy pandas
      - name: Ruff (lint + format check)
        run: |
          ruff check . --output-format=github
          ruff format --check .
      - name: Bandit (security)
        run: |
          bandit -r agents core web meta_rl scripts -ll -f screen || true
      - name: detect-secrets
        run: |
          detect-secrets scan --baseline .secrets.baseline
      - name: Architecture linter (custom)
        run: |
          python scripts/architecture_linter.py --fail-on error
      - name: Registry-coverage warning
        run: |
          python scripts/validate_registry.py

  # ──────────────────────────────────────────────────────────────────────
  # Job 2: Tests + coverage (the real signal)
  # ──────────────────────────────────────────────────────────────────────
  test:
    name: Tests & Coverage
    needs: architecture
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    env:
      REDIS_URL: redis://localhost:6379
      API_KEY: test-key
      ENVIRONMENT: test
      OLLAMA_HOST: http://localhost:11434
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install --break-system-packages \
            pytest pytest-asyncio pytest-cov httpx structlog \
            prometheus-client fastapi uvicorn psutil pydantic \
            redis faiss-cpu numpy pandas bandit detect-secrets ruff mypy
          pip install --break-system-packages -r requirements.txt || true
      - name: Test collection sanity check
        run: |
          python -m pytest --collect-only -q tests/ | tail -5
      - name: Run tests with coverage
        run: |
          python -m pytest tests/ tests/e2e/ -q --tb=short \
            --cov=agents --cov=core --cov=web --cov=meta_rl \
            --cov-report=term --cov-report=xml \
            --cov-fail-under=${{ env.COVERAGE_FAIL_UNDER }}
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  # ──────────────────────────────────────────────────────────────────────
  # Job 3: Mypy (best-effort, only on changed files, warn-only)
  # ──────────────────────────────────────────────────────────────────────
  mypy:
    name: Mypy (changed files, warn-only)
    needs: test
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: ${{ env.PYTHON_VERSION }} }
      - name: Install
        run: |
          pip install --break-system-packages mypy pydantic types-redis
      - name: Mypy
        run: |
          mypy agents/ core/ --ignore-missing-imports --no-error-summary 2>&1 | head -50 || true
