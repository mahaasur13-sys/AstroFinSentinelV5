name: CI

on:
  push:
    branches: [ master, phase2-rate-limiting ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      REDIS_URL: redis://localhost:6379
      API_KEY: test-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install --break-system-packages pytest pytest-asyncio httpx structlog prometheus-client fastapi uvicorn psutil pydantic redis faiss-cpu numpy pandas
          pip install --break-system-packages -r requirements.txt || true
      - name: Run stable tests
        run: |
      - name: Run tests
        run: |
          pip install redis
          pytest tests/ tests/e2e/ -v --tb=short
