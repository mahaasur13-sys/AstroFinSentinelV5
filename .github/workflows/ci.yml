name: CI

on:
  push:
    branches: [ master, phase2-rate-limiting ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install --break-system-packages pytest pytest-asyncio httpx structlog prometheus-client fastapi uvicorn psutil pydantic redis faiss-cpu numpy pandas
          pip install --break-system-packages -r requirements.txt || true
      - name: Run stable tests
        run: |
          pytest tests/test_auth.py tests/test_cache.py tests/test_fetch_price.py tests/test_market_analyst_async.py tests/test_bull_researcher_async.py tests/test_bear_researcher_async.py tests/test_sentiment_agent_async.py tests/test_phase1_cleanup.py tests/test_rate_limit.py -v --tb=short
