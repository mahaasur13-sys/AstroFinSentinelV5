groups:
  - name: astrofin
    rules:
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High 5xx error rate"
      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P95 latency > 2s"
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
      - alert: TimescaleDown
        expr: up{job="timescale"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "TimescaleDB is down"
      - alert: EvictionPressure
        expr: rate(container_memory_working_set_bytes{container="app"}[10m]) / container_spec_memory_limit_bytes{container="app"} > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Memory eviction pressure > 85%"
