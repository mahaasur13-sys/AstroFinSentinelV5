groups:
  - name: astrofin
    rules:
      - alert: HighErrorRate
        expr: rate(astrofin_broker_errors_total[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High broker error rate"
      - alert: OllamaDown
        expr: astrofin_ollama_available == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Ollama is down"
      - alert: CacheHitRateLow
        expr: rate(astrofin_cache_hits_total[5m]) / (rate(astrofin_cache_hits_total[5m]) + rate(astrofin_cache_misses_total[5m])) < 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Cache hit rate below 50%"
      - alert: OOSFailRateHigh
        expr: astrofin_oos_fail_rate > 0.4
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "OOS fail rate > 40%"
      - alert: DriftDetected
        expr: astrofin_drift_status == 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Model drift detected"
