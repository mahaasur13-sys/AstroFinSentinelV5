version: '3.8'

services:
  app:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: astrofinsentinel_app
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      - DATABASE_URL=postgresql+timescale://${POSTGRES_USER:-astrofin}:${POSTGRES_PASSWORD}@timescale:5432/${POSTGRES_DB:-astrofin}
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - KARL_SYNC_INTERVAL=${KARL_SYNC_INTERVAL:-10}
      - OTEL_EXPORTER_JAEGER_ENDPOINT=${OTEL_EXPORTER_JAEGER_ENDPOINT:-http://jaeger:14268/api/traces}
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME:-astrofin-sentinel}
      - GRAFANA_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GRAFANA_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    depends_on:
      timescale:
        condition: service_healthy
      redis:
        condition: service_started
      jaeger:
        condition: service_started
    restart: unless-stopped
    volumes:
      - app_data:/app/data

  timescale:
    image: timescale/timescaledb:latest-pg16
    container_name: astrofinsentinel_timescale
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-astrofin}
      - POSTGRES_USER=${POSTGRES_USER:-astrofin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ts_data:/var/lib/postgresql/data
      - ../../schema:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-astrofin}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: astrofinsentinel_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: astrofinsentinel_jaeger
    ports:
      - "16686:16686"  # UI
      - "14268:14268"  # Thrift HTTP (deprecated, но ещё используется)
      - "6831:6831/udp"  # Thrift Compact
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: astrofinsentinel_prom
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prom_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: astrofinsentinel_grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ../monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  app_data:
  ts_data:
  redis_data:
  prom_data:
  grafana_data:
