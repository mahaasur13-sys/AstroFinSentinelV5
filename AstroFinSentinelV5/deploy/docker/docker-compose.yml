version: '3.8'

services:
  app:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: astrofinsentinel_app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+timescale://${POSTGRES_USER:-astrofin}:${POSTGRES_PASSWORD}@timescale:5432/${POSTGRES_DB:-astrofin}
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - KARL_SYNC_INTERVAL=10
      - JAEGER_ENDPOINT=http://jaeger:14268/api/traces
      - OTEL_SERVICE_NAME=astrofin-sentinel
    depends_on:
      timescale:
        condition: service_healthy
      redis:
        condition: service_started
      jaeger:
        condition: service_started
    restart: unless-stopped
    volumes:
      - app_data:/app/data

  timescale:
    image: timescale/timescaledb:latest-pg15
    container_name: astrofinsentinel_timescale
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-astrofin}
      - POSTGRES_USER=${POSTGRES_USER:-astrofin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ts_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-astrofin}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: astrofinsentinel_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: astrofinsentinel_prom
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: astrofinsentinel_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/dashboards:/etc/grafana/provisioning/dashboards
      - ../monitoring/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: astrofinsentinel_jaeger
    ports:
      - "16686:16686"   # UI
      - "14268:14268"   # Collector HTTP
      - "14250:14250"   # Agent
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    container_name: astrofinsentinel_exporter
    ports:
      - "9100:9100"
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    restart: unless-stopped

volumes:
  ts_data:
  redis_data:
  prom_data:
  grafana_data:
  app_data:
