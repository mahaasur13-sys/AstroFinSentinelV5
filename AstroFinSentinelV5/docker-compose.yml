# AstroFin Sentinel V5 — Docker Compose
# ATOM-DB-MIGRATION-002: PostgreSQL (temp) + Redis + Monitoring

services:
  # ─── PostgreSQL (временно postgres:16 вместо TimescaleDB) ─────────────────
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-astrofin}
      POSTGRES_USER: ${POSTGRES_USER:-astrofin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Схема TimescaleDB временно отключена – раскомментируйте, когда вернёте образ TimescaleDB
      # - ./schema:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-astrofin} -d ${POSTGRES_DB:-astrofin}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ─── Redis (cache + session) ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Jaeger (distributed tracing) ───────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: astrofin_jaeger
    ports:
      - "16686:16686"   # UI
      - "6831:6831/udp" # Thrift compact
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    restart: unless-stopped

  # ─── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: astrofin_prometheus
    volumes:
      - ./deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  # ─── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: astrofin_grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./deploy/monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./deploy/monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./deploy/monitoring/grafana/provisioning/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000" 
    restart: unless-stopped
    depends_on:
      - prometheus

  # ─── Application (раскомментируйте, когда понадобится) ──────────────────────
  # app:
  #   build: .
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   environment:
  #     DB_BACKEND: postgresql
  #     POSTGRES_HOST: postgres
  #     POSTGRES_PORT: 5432
  #     POSTGRES_USER: astrofin
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  #     POSTGRES_DB: astrofin
  #     REDIS_HOST: redis
  #     REDIS_PORT: 6379
  #     OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
  #   ports:
  #     - "8000:8000"
  #   command: python -m orchestration.sentinel_v5 "Analyze BTC" BTCUSDT SWING

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  default:
    name: astrofin-net
