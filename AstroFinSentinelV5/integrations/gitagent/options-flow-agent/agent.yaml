name: options-flow-agent
description: GitAgent package for OptionsFlowAgent — AstroFin Sentinel V5
version: '5.0'
domain: options
weight: 0.15
karl_integrated: true
output_schema:
  signal: LONG | SHORT | NEUTRAL | BUY | SELL | AVOID
  confidence: 0-100
  reasoning: string
  sources: []
  metadata: dict
model:
  provider: openai
  name: gpt-4o-mini
  temperature: 0.3
capabilities:
- responsibilities
- output
tools:
- options_scanner
- gamma_analysis
- flow_monitor
rules:
- '# OptionsFlowAgent — RULES'
- '## Absolute Rules (Never Violate)'
- 1. Quantify uncertainty before confidence
- 2. Generate DecisionRecord per decision
- 3. Apply volatility regime guards
