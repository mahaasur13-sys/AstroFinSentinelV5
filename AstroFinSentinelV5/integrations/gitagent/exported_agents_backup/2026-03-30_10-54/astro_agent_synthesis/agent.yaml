name: astro-agent-synthesis
description: AstroFin Sentinel Synthesis Agent with KARL AMRE loop
version: '5.0'
model:
  provider: vercel
  name: minimax/minimax-m2.7
  temperature: 0.3
capabilities:
- multi_agent_synthesis
- uncertainty_estimation
- karl_reward_tracking
- drift_detection
- self_questioning
- lag_windowing
- grounding_validation
- decision_record_generation
tools:
- Swiss_Ephemeris
- Binance_API
- Coingecko_API
compliance:
  audit: true
  karll_enabled: true
  volatility_guards: true
sub_agents:
- name: astro_signal_aggregator
  type: aggregator
  weight: 1.0
workflows:
- synthesize
- route_uncertainty
output_schema:
  signal: LONG | SHORT | NEUTRAL | BUY | SELL | AVOID
  confidence: 0-100
  reasoning: str
  sources: []
domain: astro
rules:
- '# RULES.md — Synthesis Agent Rules'
- '## Absolute Rules'
- 1. **Never report confidence > 92** (EC-01 hubris cap)
- 2. **Block all trades in EXTREME volatility regime**
- 3. **Always include uncertainty metrics** (aleatoric + epistemic + total)
