name: riskagent
description: GitAgent package for RiskAgent — AstroFin Sentinel V5
version: '5.0'
domain: risk
weight: 0.05
karl_integrated: true
output_schema:
  signal: LONG | SHORT | NEUTRAL | BUY | SELL | AVOID
  confidence: 0-100
  reasoning: string
  sources: []
  metadata: dict
model:
  provider: openai
  name: gpt-4o-mini
  temperature: 0.3
capabilities:
- responsibilities
- output
tools:
- risk_calculator
- var_computation
- stress_testing
rules:
- '# RiskAgent — RULES'
- '## Absolute Rules (Never Violate)'
- 1. Quantify uncertainty before confidence
- 2. Generate DecisionRecord per decision
- 3. Apply volatility regime guards
