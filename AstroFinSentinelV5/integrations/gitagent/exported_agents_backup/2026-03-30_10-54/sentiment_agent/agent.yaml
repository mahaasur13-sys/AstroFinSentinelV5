name: sentimentagent
description: GitAgent package for SentimentAgent — AstroFin Sentinel V5
version: '5.0'
domain: sentiment
weight: 0.1
karl_integrated: true
output_schema:
  signal: LONG | SHORT | NEUTRAL | BUY | SELL | AVOID
  confidence: 0-100
  reasoning: string
  sources: []
  metadata: dict
model:
  provider: openai
  name: gpt-4o-mini
  temperature: 0.3
capabilities:
- responsibilities
- output
tools:
- news_feed
- social_sentiment
- fear_greed_index
rules:
- '# SentimentAgent — RULES'
- '## Absolute Rules (Never Violate)'
- 1. Quantify uncertainty before confidence
- 2. Generate DecisionRecord per decision
- 3. Apply volatility regime guards
